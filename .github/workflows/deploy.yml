name: Déploiement GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:          # permet de déclencher manuellement depuis l'onglet Actions

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Injecter la clé API Gemini
        # La clé est stockée dans Settings → Secrets → GEMINI_API_KEY
        # Elle n'apparaît jamais dans le code source ni dans l'historique Git
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          printf 'const GEMINI_API_KEY = "%s";\n' "$GEMINI_API_KEY" > config.js

      - name: Configurer GitHub Pages
        uses: actions/configure-pages@v5

      - name: Préparer l'artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Déployer
        id: deployment
        uses: actions/deploy-pages@v4
